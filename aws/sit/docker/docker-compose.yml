version: '3.8'

# Docker Compose file for AuxDromos SIT environment
# Uses environment variables from AWS Systems Manager Parameter Store

services:
  config:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/auxdromos-config:${CONFIG_IMAGE_TAG:-latest}
    container_name: auxdromos-config
    ports:
      - "${EXTERNAL_PORT:-8888}:${INTERNAL_PORT:-8888}"
    environment:
      - SPRING_CLOUD_CONFIG_SERVER_GIT_URI=${SPRING_CLOUD_CONFIG_SERVER_GIT_URI}
      - SPRING_CLOUD_CONFIG_SERVER_GIT_USERNAME=${SPRING_CLOUD_CONFIG_SERVER_GIT_USERNAME}
      - SPRING_CLOUD_CONFIG_SERVER_GIT_PASSWORD=${SPRING_CLOUD_CONFIG_SERVER_GIT_PASSWORD}
      - SPRING_CLOUD_CONFIG_SERVER_GIT_DEFAULT_LABEL=${SPRING_CLOUD_CONFIG_SERVER_GIT_DEFAULT_LABEL}
      - SPRING_CLOUD_CONFIG_SERVER_GIT_SEARCH_PATHS=${SPRING_CLOUD_CONFIG_SERVER_GIT_SEARCH_PATHS}
      - SPRING_CLOUD_BUS_ENABLED=false
      - MANAGEMENT_ENDPOINT_HEALTH_ENABLED=true
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health
      - JAVA_TOOL_OPTIONS=-XX:ReservedCodeCacheSize=64M -Xss512K -XX:MaxMetaspaceSize=128M -Xmx256m -XX:MaxDirectMemorySize=32M -XX:MaxRAMPercentage=75.0
      - BPL_JVM_THREAD_COUNT=50
      - BPL_JVM_HEAD_ROOM=0
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-sit}
    networks:
      - auxdromos-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rdbms:
    # Usa variabili d'ambiente per tag, account e regione
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/auxdromos-rdbms:${RDBMS_IMAGE_TAG:-latest}
    container_name: auxdromos-rdbms
    ports:
      # Usa le variabili d'ambiente esportate dallo script
      - "${EXTERNAL_PORT:-8089}:${INTERNAL_PORT:-8089}" # Aggiunti default
    environment:
      # Queste verranno lette dall'ambiente esterno (esportate dallo script)
      SPRING_CLOUD_CONFIG_URI: "http://auxdromos-config:8888" # Fisso
      PROFILE: "${PROFILE:-sit}"
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-sit}"
      SPRING_APPLICATION_NAME: "rdbms" # Fisso
      JAVA_TOOL_OPTIONS: "-Xmx576m -XX:MaxRAMPercentage=75.0" # Fisso
      # Secrets from SSM Parameter Store
      DB_URL: "${DB_URL}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL}"
    deploy:
      resources:
        limits:
          memory: 768M
    restart: no
    networks:
      - auxdromos-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  idp:
    # Usa variabili d'ambiente per tag, account e regione
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/auxdromos-idp:${IDP_IMAGE_TAG:-latest}
    container_name: auxdromos-idp
    ports:
      # Usa le variabili d'ambiente esportate dallo script
      - "${EXTERNAL_PORT:-8081}:${INTERNAL_PORT:-8081}" # Aggiunti default
    environment:
      # Queste verranno lette dall'ambiente esterno (esportate dallo script)
      SPRING_CLOUD_CONFIG_URI: "http://auxdromos-config:8888" # Fisso
      PROFILE: "${PROFILE:-sit}"
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-sit}"
      SPRING_APPLICATION_NAME: "idp" # Fisso
      JAVA_TOOL_OPTIONS: "-Xmx576m -XX:MaxRAMPercentage=75.0" # Fisso
      # Secrets from SSM Parameter Store
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL}"
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - auxdromos-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    # Uses environment variables for tag, account, and region
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/auxdromos-backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: auxdromos-backend
    ports:
      # Uses environment variables exported by the script
      - "${EXTERNAL_PORT:-8083}:${INTERNAL_PORT:-8083}" # Added defaults
    environment:
      # These are read from external environment (exported by the script)
      SPRING_CLOUD_CONFIG_URI: "http://auxdromos-config:8888" # Fixed
      PROFILE: "${PROFILE:-sit}"
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-sit}"
      SPRING_APPLICATION_NAME: "backend" # Fixed
      JAVA_TOOL_OPTIONS: "-Xmx768m -XX:MaxRAMPercentage=75.0" # Fixed
      # Secrets from SSM Parameter Store
      DB_URL: "${DB_URL}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL}"
      PAGOPA_RECEIPTS_SUBSCRIPTION_KEY: "${PAGOPA_RECEIPTS_SUBSCRIPTION_KEY}"
      PAGOPA_GDP_SUBSCRIPTION_KEY: "${PAGOPA_GDP_SUBSCRIPTION_KEY}"
      PAGOPA_PRINT_SUBSCRIPTION_KEY: "${PAGOPA_PRINT_SUBSCRIPTION_KEY}"
      PAGOPA_FDR_SUBSCRIPTION_KEY: "${PAGOPA_FDR_SUBSCRIPTION_KEY}"
      PAGOPA_HMAC_SECRET: "${PAGOPA_HMAC_SECRET}"
      PAGOPA_RECEIPT_HMAC_SECRET_KEY: "${PAGOPA_RECEIPT_HMAC_SECRET_KEY}"
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - auxdromos-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pagodesk-service:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/auxdromos-pagodesk-service:${PAGODESK_SERVICE_IMAGE_TAG:-latest}
    container_name: auxdromos-pagodesk-service
    ports:
      - "${EXTERNAL_PORT:-8084}:${INTERNAL_PORT:-8084}"
    environment:
      SPRING_CLOUD_CONFIG_URI: "http://auxdromos-config:8888"
      PROFILE: "${PROFILE:-sit}"
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-sit}"
      SPRING_APPLICATION_NAME: "pagodesk"
      JAVA_TOOL_OPTIONS: >-
        -Xmx768m
        -XX:MaxRAMPercentage=75.0
        -Duser.timezone=Europe/Rome
      DB_URL: "${DB_URL}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      PAGOPA_HMAC_SECRET: "${PAGOPA_HMAC_SECRET}"
      PAGOPA_RECEIPTS_SUBSCRIPTION_KEY: "${PAGOPA_RECEIPTS_SUBSCRIPTION_KEY}"
      PAGOPA_GDP_SUBSCRIPTION_KEY: "${PAGOPA_GDP_SUBSCRIPTION_KEY}"
      PAGOPA_FDR_SUBSCRIPTION_KEY: "${PAGOPA_FDR_SUBSCRIPTION_KEY}"
      PAGOPA_PRINT_SUBSCRIPTION_KEY: "${PAGOPA_PRINT_SUBSCRIPTION_KEY}"
      PAGOPA_RECEIPT_HMAC_SECRET_KEY: "${PAGOPA_RECEIPT_HMAC_SECRET_KEY}"
      PAGOPA_API_BASE_URL: "${PAGOPA_API_BASE_URL}"
      SQS_BULK_OPERATIONS_QUEUE_URL: "${SQS_BULK_OPERATIONS_QUEUE_URL}"
      SQS_EMAIL_RETRY_QUEUE_URL: "${SQS_EMAIL_RETRY_QUEUE_URL}"
      SQS_DOMAIN_EVENTS_QUEUE_URL: "${SQS_DOMAIN_EVENTS_QUEUE_URL}"
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL}"
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - auxdromos-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  gateway:
    # Uses environment variables for tag, account, and region
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/auxdromos-gateway:${GATEWAY_IMAGE_TAG:-latest}
    container_name: auxdromos-gateway
    ports:
      # Uses environment variables exported by the script
      - "${EXTERNAL_PORT:-8080}:${INTERNAL_PORT:-8080}" # Added defaults
    environment:
      # These are read from external environment (exported by the script)
      SPRING_CLOUD_CONFIG_URI: "http://auxdromos-config:8888" # Fixed
      PROFILE: "${PROFILE:-sit}"
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-sit}"
      SPRING_APPLICATION_NAME: "gateway" # Fixed
      JAVA_TOOL_OPTIONS: "-Xmx576m -XX:MaxRAMPercentage=75.0" # Fixed
      # Secrets from SSM Parameter Store
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL}"
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - auxdromos-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  print-service:
    # Uses environment variables for tag, account, and region
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/auxdromos-print-service:${PRINT_SERVICE_IMAGE_TAG:-latest}
    container_name: auxdromos-print-service
    ports:
      # Uses environment variables exported by the script
      - "${EXTERNAL_PORT:-8085}:${INTERNAL_PORT:-8085}" # Added defaults
    environment:
      # These are read from external environment (exported by the script)
      SPRING_CLOUD_CONFIG_URI: "http://auxdromos-config:8888" # Fixed
      PROFILE: "${PROFILE:-sit}"
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-sit}"
      SPRING_APPLICATION_NAME: "print-service" # Fixed
      JAVA_TOOL_OPTIONS: "-Xmx768m -XX:MaxRAMPercentage=75.0" # Fixed
      # Secrets from SSM Parameter Store
      DB_URL: "${DB_URL}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL}"
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - auxdromos-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  admin-dashboard:
    # Uses environment variables for tag, account, and region
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/auxdromos-admin-dashboard:${ADMIN_DASHBOARD_IMAGE_TAG:-latest}
    container_name: auxdromos-admin-dashboard
    ports:
      # Uses environment variables exported by the script
      - "${EXTERNAL_PORT:-8086}:${INTERNAL_PORT:-8086}" # Added defaults
    environment:
      # These are read from external environment (exported by the script)
      SPRING_CLOUD_CONFIG_URI: "http://auxdromos-config:8888" # Fixed
      PROFILE: "${PROFILE:-sit}"
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-sit}"
      SPRING_APPLICATION_NAME: "admin-dashboard" # Fixed
      JAVA_TOOL_OPTIONS: "-Xmx768m -XX:MaxRAMPercentage=75.0" # Fixed
      # Secrets from SSM Parameter Store
      DB_URL: "${DB_URL}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL}"
      COGNITO_CLIENT_SECRET: "${COGNITO_CLIENT_SECRET}"
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - auxdromos-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  auxdromos-network:
    external: true
